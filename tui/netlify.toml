[build]
  command = "npm run build"
  publish = "dist"

# Proxy all /api/* requests to the Render backend
[[redirects]]
  from = "/api/*"
  to = "https://backend-latest-cuvw.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback — must come LAST
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
